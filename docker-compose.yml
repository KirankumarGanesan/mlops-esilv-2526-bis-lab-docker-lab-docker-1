services:
  backend:
    image: ganesankirankumar/my-back:latest
    ports:
      - "8080:5000"
    environment:
      - CURRENT_ENVIRONMENT=production

  frontend:
    image: ganesankirankumar/my-front:latest
    ports:
      - "8081:80"
    environment:
      - WS_BACK_URL=http://localhost:8080
    depends_on:
      - backend